services:
  app:
    image: ${ECR_IMAGE}
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:3010:3010"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-files: "5"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3010/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
