version: 2
updates:
    - package-ecosystem: npm
      directory: /
      schedule:
          interval: weekly
          day: monday
      open-pull-requests-limit: 5
      groups:
          ai-sdk:
              patterns:
                  - "ai"
                  - "@ai-sdk/*"
          x-api:
              patterns:
                  - "@xdevplatform/*"

    - package-ecosystem: github-actions
      directory: /
      schedule:
          interval: weekly
          day: monday
      open-pull-requests-limit: 5
